<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přihlášení</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f6f8;
            font-family: Arial, sans-serif;
            color: #222;
            padding: 16px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            text-align: center;
            font-size: 26px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .field-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #475569;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            background: #2563eb;
            color: white;
            margin-top: 8px;
        }

        .flash {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .hint {
            margin-top: 16px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Přihlášení</h1>
    <div class="subtitle">Evidenční systém společnosti JZ Elektro</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="field-group">
            <label for="username">Uživatelské jméno</label>
            <input id="username" type="text" name="username" required>
        </div>

        <div class="field-group">
            <label for="password">Heslo</label>
            <input id="password" type="password" name="password" required>
        </div>

        <button class="btn" type="submit">Přihlásit se</button>
    </form>

    <div class="hint">
        Účet s rolí <strong>qr_terminal</strong> je určen pouze pro zobrazení živého QR kódu.
    </div>
</div>
</body>
</html>
