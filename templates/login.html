<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přihlášení</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }
        .wrap {
            max-width: 420px;
            margin: 60px auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-top: 0;
        }
        label {
            display: block;
            font-weight: bold;
            margin: 12px 0 6px;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .flash {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Přihlášení</h1>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="flash">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <label>Uživatelské jméno</label>
                <input type="text" name="username" required>

                <label>Heslo</label>
                <input type="password" name="password" required>

                <button type="submit">Přihlásit se</button>
            </form>
        </div>
    </div>
</body>
</html>
