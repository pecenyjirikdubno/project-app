<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Hlavní menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Zakázky">

    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .page {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 24px;
        }

        .menu {
            display: grid;
            gap: 14px;
        }

        .btn {
            display: block;
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-success {
            background: #16a34a;
            color: white;
        }

        .btn-secondary {
            background: #64748b;
            color: white;
        }

        .footer {
            position: fixed;
            bottom: 10px;
            left: 12px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="page">

    <h1>Vítejte v evidenčním systému společnosti JZ Elektro</h1>

    <div class="menu">
        <a href="{{ url_for('materials') }}" class="btn btn-primary">Materiál</a>
        <a href="{{ url_for('attendance') }}" class="btn btn-success">Docházka</a>

        {% if current_user.role == 'admin' %}
            <a href="{{ url_for('users') }}" class="btn btn-secondary">Uživatelé</a>
        {% endif %}

        <a href="{{ url_for('logout') }}" class="btn btn-secondary">Odhlásit se</a>
    </div>

</div>

<div class="footer">
    Vypracoval: Ing. Jiří Pečený
</div>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("/service-worker.js");
  });
}
</script>

</body>
</html>
