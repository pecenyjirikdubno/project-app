<h2>Zakázky</h2>
<a href="{{ url_for('users') }}">👤 Správa uživatelů</a>
<form action="{{ url_for('create') }}" method="POST">
    <input type="text" name="name" placeholder="Název zakázky" required>
    <button type="submit">Vytvořit</button>
</form>

<ul>
{% for p in projects %}
    <li>
        <a href="/project/{{p.id}}">{{p.name}}</a>
    </li>
{% endfor %}
</ul>

<a href="/logout">Odhlásit</a>
