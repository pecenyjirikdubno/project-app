<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Zakázky</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 30px; }
        th, td { border: 1px solid #ccc; padding: 5px; text-align: center; }
        input { width: 100%; }
        .job { border: 2px solid #000; padding: 10px; margin-bottom: 30px; }
        button { padding: 5px 10px; }
    </style>
</head>
<body>

<h1>Zakázky</h1>

<form method="POST" action="/create_job">
    <input type="text" name="name" placeholder="Název zakázky">
    <button type="submit">Vytvořit</button>
</form>

<hr>

{% for job in jobs %}
<div class="job">
    <h2>{{ job.name }}</h2>

    <form method="POST" action="/save/{{ job.id }}">
        <table>
            <tr>
                <th>Datum</th>
                <th>Materiál</th>
                <th>Množství</th>
                <th>Číslo dokladu</th>
                <th>Km</th>
                <th>Čas na cestě</th>
                <th>Odpracované hodiny</th>
            </tr>

            {% for row in job.rows %}
            <tr>
                <td>
                    <input type="date" name="date_{{ row.id }}" value="{{ row.date }}">
                </td>
                <td>
                    <input name="material_name_{{ row.id }}" value="{{ row.material_name }}">
                </td>
                <td>
                    <input type="number" step="any" name="quantity_{{ row.id }}" value="{{ row.quantity }}">
                </td>
                <td>
                    <input name="document_number_{{ row.id }}" value="{{ row.document_number }}">
                </td>
                <td>
                    <input type="number" step="any" name="km_{{ row.id }}" value="{{ row.km }}">
                </td>
                <td>
                    <input type="number" step="any" name="travel_time_{{ row.id }}" value="{{ row.travel_time }}">
                </td>
                <td>
                    <input type="number" step="any" name="work_hours_{{ row.id }}" value="{{ row.work_hours }}">
                </td>
            </tr>
            {% endfor %}
        </table>

        <button type="submit">💾 Uložit</button>
    </form>

    <br>

    <form method="POST" action="/add_row/{{ job.id }}">
        <button type="submit">➕ Přidat řádek</button>
    </form>

    <br>

    <a href="/export/{{ job.id }}">📥 Export Excel</a> |
    <a href="/close/{{ job.id }}">❌ Uzavřít</a>
</div>
{% endfor %}

</body>
</html>
