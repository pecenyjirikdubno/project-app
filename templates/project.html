<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 10px;
}

h2 {
    text-align: center;
}

.card {
    background: white;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.section-title {
    font-weight: bold;
    margin-top: 10px;
    margin-bottom: 5px;
}

label {
    font-size: 12px;
    color: #666;
}

.required {
    color: red;
}

input {
    width: 100%;
    padding: 10px;
    margin: 2px 0 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

input:required {
    border: 1.5px solid red;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #007bff;
    color: white;
    margin-top: 6px;
}

.delete {
    background: red;
}
</style>

<script>
function autoSave(form){
    fetch(form.action, {
        method: "POST",
        body: new FormData(form)
    });
}
</script>

</head>
<body>

<h2>{{project.name}}</h2>

{% if not project.closed %}

<div class="card">
<a href="/add_empty_entry/{{project.id}}">
    <button>➕ Nový řádek</button>
</a>
</div>

{% for e in entries %}
<div class="card">
<form method="post" action="/edit_entry/{{e.id}}" onchange="autoSave(this)">

<div class="section-title">📦 Materiál</div>

<label>Datum <span class="required">*</span></label>
<input type="date" name="date" value="{{e.date}}" required>

<label>Kód materiálu <span class="required">*</span></label>
<input name="material_code" value="{{e.material_code}}" placeholder="např. MAT-001" required>

<label>Číslo dokladu</label>
<input name="document_number" value="{{e.document_number}}" placeholder="např. 2024-001">

<label>Dodavatel</label>
<input name="supplier" value="{{e.supplier}}" placeholder="např. Skanska">

<label>Množství</label>
<input name="quantity" type="number" value="{{e.quantity}}" placeholder="např. 10">

<label>Popis</label>
<input name="description" value="{{e.description}}" placeholder="popis">

<div class="section-title">⏱️ Práce</div>

<label>Hodiny</label>
<input name="hours" type="number" value="{{e.hours}}" placeholder="např. 8">

<div class="section-title">🚗 Doprava</div>

<label>KM</label>
<input name="km" type="number" value="{{e.km}}" placeholder="např. 120">

<label>Čas na cestě</label>
<input name="travel_time" value="{{e.travel_time}}" placeholder="např. 2h">

{% if current_user.role == 'admin' %}
<a href="/delete_entry/{{e.id}}">
    <button type="button" class="delete">Smazat</button>
</a>
{% endif %}

</form>
</div>
{% endfor %}

{% endif %}

<div class="card">

{% if not project.closed %}
<a href="/close_project/{{project.id}}">
    <button>Uzavřít zakázku</button>
</a>
{% endif %}

<a href="/export/{{project.id}}">
    <button>Export Excel</button>
</a>

<a href="/">
    <button>Zpět</button>
</a>

</div>

</body>
</html>
